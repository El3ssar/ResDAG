<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3949ab"/>
      <stop offset="100%" stop-color="#00bcd4"/>
    </linearGradient>
  </defs>
  <!-- Reservoir nodes forming a small-world graph -->
  <circle cx="24" cy="10" r="3.5" fill="url(#grad)" opacity="0.9"/>
  <circle cx="38" cy="20" r="3.5" fill="url(#grad)" opacity="0.9"/>
  <circle cx="34" cy="36" r="3.5" fill="url(#grad)" opacity="0.9"/>
  <circle cx="14" cy="36" r="3.5" fill="url(#grad)" opacity="0.9"/>
  <circle cx="10" cy="20" r="3.5" fill="url(#grad)" opacity="0.9"/>
  <circle cx="24" cy="24" r="4.5" fill="url(#grad)"/>
  <!-- Edges -->
  <line x1="24" y1="10" x2="38" y2="20" stroke="url(#grad)" stroke-width="1.5" opacity="0.5"/>
  <line x1="38" y1="20" x2="34" y2="36" stroke="url(#grad)" stroke-width="1.5" opacity="0.5"/>
  <line x1="34" y1="36" x2="14" y2="36" stroke="url(#grad)" stroke-width="1.5" opacity="0.5"/>
  <line x1="14" y1="36" x2="10" y2="20" stroke="url(#grad)" stroke-width="1.5" opacity="0.5"/>
  <line x1="10" y1="20" x2="24" y2="10" stroke="url(#grad)" stroke-width="1.5" opacity="0.5"/>
  <line x1="24" y1="10" x2="24" y2="24" stroke="url(#grad)" stroke-width="1.5" opacity="0.6"/>
  <line x1="38" y1="20" x2="24" y2="24" stroke="url(#grad)" stroke-width="1.5" opacity="0.6"/>
  <line x1="34" y1="36" x2="24" y2="24" stroke="url(#grad)" stroke-width="1.5" opacity="0.6"/>
  <line x1="14" y1="36" x2="24" y2="24" stroke="url(#grad)" stroke-width="1.5" opacity="0.6"/>
  <line x1="10" y1="20" x2="24" y2="24" stroke="url(#grad)" stroke-width="1.5" opacity="0.6"/>
  <!-- Skip connections -->
  <line x1="24" y1="10" x2="34" y2="36" stroke="url(#grad)" stroke-width="1" opacity="0.25" stroke-dasharray="3,2"/>
  <line x1="38" y1="20" x2="14" y2="36" stroke="url(#grad)" stroke-width="1" opacity="0.25" stroke-dasharray="3,2"/>
</svg>
