# Release automation.
#
# Every push to main: tests gate, then python-semantic-release inspects the
# conventional commits since the last tag. If they warrant a release it
# bumps src/resdag/__init__.py, commits, tags vX.Y.Z, creates the GitHub
# release with generated notes, builds the package, and publishes to PyPI
# via trusted publishing. Commits that don't warrant a release (docs:,
# chore:, ci:, ...) make this workflow a no-op after the tests.
#
# NOTE: PyPI trusted publishing is bound to this workflow filename
# (release.yml) — do not rename the file.

name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  test:
    # Shared with ci.yml — lint, type-check, and the full Python 3.11-3.14 test
    # matrix with coverage. force-full: true because every push to main is a
    # release candidate and must run the whole suite, not a selective subset.
    uses: ./.github/workflows/_test.yml
    with:
      force-full: true
    secrets: inherit

  release:
    needs: test
    # Releases are FROZEN until 1.0 while breaking changes accumulate on main.
    # The repo variable RELEASE_FROZEN=true skips publishing; CI (the `test` job) still runs.
    # To cut 1.0: `gh variable delete RELEASE_FROZEN` (or set false), then merge a release commit.
    # Do NOT rename this file — PyPI trusted publishing is bound to release.yml.
    if: ${{ github.repository == 'El3ssar/resdag' && vars.RELEASE_FROZEN != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Semantic release (version, tag, GitHub release, build)
        id: semrel
        uses: python-semantic-release/python-semantic-release@v10
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach build artifacts to the GitHub release
        if: steps.semrel.outputs.released == 'true'
        uses: python-semantic-release/publish-action@v10
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.semrel.outputs.tag }}

      - name: Publish to PyPI
        if: steps.semrel.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
