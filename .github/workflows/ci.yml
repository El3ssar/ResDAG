# Pull-request gate: lint + tests. (Docs build correctness is checked by
# docs.yml, which also runs on pull requests.)

name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install CPU torch (slim CI)
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install package with dev extras
        run: pip install -e ".[dev,hpo]"

      - name: Lint
        run: |
          ruff check src/ tests/
          black --check src/ tests/

      - name: Type check (core model)
        # Scoped to model.py (the forecast/warmup typing gate); --follow-imports=silent
        # uses imported modules for type info without reporting their pre-existing errors.
        run: mypy --follow-imports=silent src/resdag/core/model.py

      - name: Tests
        run: pytest --no-cov -q
