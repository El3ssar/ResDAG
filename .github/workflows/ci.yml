# Pull-request gate: lint + type-check + tests, via the reusable _test.yml
# workflow (shared with release.yml). (Docs build correctness is checked by
# docs.yml, which also runs on pull requests.)
#
# Tests are SELECTIVE on pull requests: `tools/affected_tests.py` diffs the PR
# against its base and runs only the test files that the change can affect, via
# a static first-party import graph (see that script's docstring). This turns a
# ~4-minute full run into seconds for a typical single-module PR.
#
# Safety nets — selection is never the last line of defence before a release:
#   * The FULL suite runs on every push to main (release.yml) and nightly here.
#   * Broad-impact changes (pyproject, conftest, package __init__, the selector
#     itself, ...) force a full run; the selector fails safe to "run everything".
#   * Add the `ci-full` label to a PR to force a full run on demand.
#
# Coverage (full runs only) is computed, gated by a `fail_under` floor, and
# uploaded to Codecov by _test.yml.
#
# The CPU benchmark lane guards the performance regressions the fast paths were
# built to prevent (#263). It runs nightly, on manual dispatch, and on any PR
# carrying the `benchmark` label. It gates on the committed floors in
# `benchmarks/targets.json` (via `pytest -m benchmark`) and re-renders + uploads
# `benchmarks/results/REPORT.md` as a build artifact. See `benchmarks/README.md`.

name: CI

on:
  pull_request:
    branches: [main]
  schedule:
    # Nightly full-suite safety net (04:17 UTC) — catches any selection gap or
    # environment drift that a PR's selective run could have missed.
    - cron: "17 4 * * *"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    uses: ./.github/workflows/_test.yml
    with:
      # Anything that is not a PR (nightly schedule, manual dispatch), or a PR
      # carrying the `ci-full` label, runs the whole suite with coverage.
      force-full: ${{ github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'ci-full') }}
      base-sha: ${{ github.event.pull_request.base.sha }}
    secrets: inherit

  benchmark:
    # CPU performance-regression lane — runs nightly, on manual dispatch, and on
    # any PR labelled `benchmark` (so a PR touching a fast path can opt in to the
    # gate on demand without waiting for the nightly run). `-m benchmark` runs the
    # performance assertions deselected by default; the internal-ratio gates in
    # tests/test_benchmarks (gated on benchmarks/targets.json) and the CPU
    # benchmarks in tests/test_performance run here, while the @gpu ones auto-skip
    # without CUDA.
    if: >-
      ${{ github.event_name == 'schedule'
          || github.event_name == 'workflow_dispatch'
          || (github.event_name == 'pull_request'
              && contains(github.event.pull_request.labels.*.name, 'benchmark')) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install CPU torch (slim CI)
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install package with dev extras
        run: pip install -e ".[dev,hpo]"

      - name: Benchmarks (CPU) — gate on benchmarks/targets.json
        run: pytest -m benchmark --no-cov -q tests/test_benchmarks tests/test_performance

      - name: Re-render cross-library REPORT.md (resdag-only, deterministic)
        # reservoirpy / ReservoirComputing.jl are not installed in CI, so this
        # renders the resdag-only rows; it proves the report regenerates
        # deterministically with the flat-engine forecast win reflected. The
        # committed REPORT.md (full cross-library matrix) is regenerated on the
        # benchmark machine where the external libraries are present.
        working-directory: benchmarks
        run: python -m rc_bench.run --quick --report --out results/ci-latest.json

      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: |
            benchmarks/results/REPORT.md
            benchmarks/results/ci-latest.json
          if-no-files-found: warn
