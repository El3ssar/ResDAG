name: Documentation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Weekly link-check canary (Mondays 06:00 UTC) — catches doc-URL drift
    # such as the GitHub Pages casing without gating day-to-day PRs.
    - cron: "0 6 * * 1"

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

# mkdocs-material (via transitive plugins) may print an MkDocs 2.x deprecation notice;
# the build remains valid on MkDocs 1.x.
env:
  DISABLE_MKDOCS_2_WARNING: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # mkdocs-git-revision-date-localized needs history for per-file timestamps
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install CPU torch (slim CI)
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install package and docs dependencies
        run: pip install -e ".[docs]"

      - name: Build documentation
        run: mkdocs build --strict

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: docs-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install CPU torch (slim CI)
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install package and docs dependencies
        run: pip install -e ".[docs]"

      - name: Build documentation
        run: mkdocs build --strict

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true

  linkcheck:
    # Validates the project's own documentation/metadata URLs — the canonical
    # GitHub Pages casing in particular. Runs only on the weekly schedule and
    # on manual dispatch, never on a pull request, so a transient external 404
    # can never block unrelated work. The deterministic casing guard lives in
    # tests/test_packaging_metadata.py and runs on every PR.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check documentation links
        uses: lycheeverse/lychee-action@v2
        with:
          fail: true
          args: >-
            --no-progress
            --exclude=mailto:
            README.md
            CONTRIBUTING.md
            examples/README.md
            docs/project/index.md
            docs/project/changelog.md
            .github/ISSUE_TEMPLATE/config.yml
