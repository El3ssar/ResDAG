name: Feature request
description: Propose new functionality
title: "feat: <short description>"
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do today, or what is harder than it should be?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed API
      description: Sketch how it would look to the user (code welcome).
      render: python
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
