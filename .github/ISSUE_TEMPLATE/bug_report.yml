name: Bug report
description: Something behaves incorrectly
title: "fix: <short description>"
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: ResDAG version
      description: "`python -c 'import resdag; print(resdag.__version__)'`"
      placeholder: "0.5.0"
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: The smallest script that shows the problem. Tensors are (batch, time, features).
      render: python
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual
      description: What you expected, what happened instead (paste the traceback if any).
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      description: OS, Python, PyTorch version, CPU/GPU (and GPU model if relevant)
      placeholder: "Linux, Python 3.12, torch 2.10, RTX 3060"
    validations:
      required: true
